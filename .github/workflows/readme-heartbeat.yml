name: Update README heartbeat

on:
  schedule:
    - cron: "30 3,9,15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-heartbeat
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update README heartbeat
        run: npm run heartbeat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_BRANCH: master
          INSTANCE_NAME: github-actions-${{ github.run_number }}
